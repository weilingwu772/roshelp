site_name: ROS Help Center
theme:
  name: material
  language: zh-Hant
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - 首頁: index.md
  - ROS2 入門指南: ROS2_Introduction.md
  - 硬體通訊架構:
      - 通訊概述: ROS2_Hardware_Communication.md
      - 整合框架: ROS_Hardware_Integration_Framework.md
  - 進階指南:
      - ROS Bridge 指南: ROS_Bridge_Guide.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
